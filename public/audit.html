<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Executiva - Agente RIG</title>
    <link rel="stylesheet" href="audit.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h2>Agente RIG - Monitoramento de Auditoria</h2>
                <p class="subtitle">Visão Executiva em Tempo Real</p>
            </div>
            <button id="btn-logout" class="btn-logout"><i class="ph ph-sign-out"></i> Sair</button>
        </header>
        
        <div class="dashboard-content">
            <div id="error-message" class="error-message"></div>
            
            <!-- KPIs -->
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="ph ph-users"></i></div>
                    <div class="kpi-info">
                        <span class="kpi-title">Usuários Ativos (Agora)</span>
                        <h3 id="kpi-active-users">0</h3>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="ph ph-sign-in"></i></div>
                    <div class="kpi-info">
                        <span class="kpi-title">Logins Hoje</span>
                        <h3 id="kpi-logins-today">0</h3>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="ph ph-user-check"></i></div>
                    <div class="kpi-info">
                        <span class="kpi-title">Usuários Únicos</span>
                        <h3 id="kpi-unique-users">0</h3>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="ph ph-clock"></i></div>
                    <div class="kpi-info">
                        <span class="kpi-title">Média de Sessão</span>
                        <h3 id="kpi-avg-session">0m</h3>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="ph ph-star"></i></div>
                    <div class="kpi-info">
                        <span class="kpi-title">Usuário Mais Ativo</span>
                        <h3 id="kpi-top-user">-</h3>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h4>Atividade por Hora</h4>
                    <canvas id="chart-hourly"></canvas>
                </div>
                <div class="chart-card">
                    <h4>Top Usuários (Sessões)</h4>
                    <canvas id="chart-top-users"></canvas>
                </div>
            </div>

            <!-- Filters & Table -->
            <div class="table-section">
                <div class="table-header">
                    <h4>Registros de Auditoria</h4>
                    <div class="filters">
                        <input type="date" id="filter-date" title="Filtrar por data">
                        <input type="text" id="filter-user" placeholder="Buscar por nome ou matrícula">
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="audit-table">
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Nome</th>
                                <th>Matrícula</th>
                                <th>Login</th>
                                <th>Logout</th>
                                <th>Tempo Sessão</th>
                                <th>IP</th>
                            </tr>
                        </thead>
                        <tbody id="audit-tbody">
                            <!-- Dados dinâmicos -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="audit.js"></script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agente RIG — Hero</title>
  <link rel="stylesheet" href="/browser/src/styles/HomeHero.css" />
</head>
<body>
  <div id="hero-root" class="hero-root">
    <div id="hero-webgl" style="position:absolute;inset:0;z-index:0;"></div>
    <div class="hero-content">
      <div class="hero-badge">AGENTE RIG</div>
      <h1 class="hero-title">A INTELIGÊNCIA POR TRÁS DA ROTA</h1>
      <p class="hero-sub">Otimização preditiva, segurança avançada e visibilidade total da sua frota em tempo real.</p>
      <div class="hero-actions">
        <button class="btn btn-primary" onclick="location.href='/'">VOLTAR</button>
        <button class="btn btn-ghost" onclick="window.open('/public/assets/hero-fallback.jpg','_blank')">VER IMAGEM</button>
      </div>
    </div>
  </div>

  <script type="module">
    import initHeroCanvas from '/browser/src/lib/initHeroCanvas.js';
    window.addEventListener('DOMContentLoaded', () => {
      if (document.getElementById('hero-webgl')) initHeroCanvas('hero-webgl');
    });
  </script>
</body>
</html>

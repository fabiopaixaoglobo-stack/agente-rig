<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agente RIG</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Bem-vindo ao Agente RIG</h2>
            <p class="subtitle">Faça login para continuar</p>
            <div id="error-message" class="error-message"></div>
            <form id="login-form">
                <div class="input-group">
                    <label for="identificador">E-mail ou Matrícula</label>
                    <input type="text" id="identificador" name="identificador" required placeholder="Digite seu e-mail ou matrícula">
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            <div class="register-link">
                <p>Primeiro acesso? <a href="/register.html">Cadastre-se</a></p>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>

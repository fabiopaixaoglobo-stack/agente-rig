<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AGENTE RIG | Painel Operacional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AGENTE RIG</h1>
        <input type="file" id="upload-mapa" accept=".xlsx" hidden>
        <button onclick="document.getElementById('upload-mapa').click()">📥 Sincronizar Base</button>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <nav>
                <button class="tab-btn" onclick="showTab('mapa')">📍 Monitoramento</button>
                <button class="tab-btn" onclick="showTab('rotas')">🛣️ Planejador</button>
                <button class="tab-btn" onclick="showTab('normas')">💬 Consultor</button>
            </nav>
            <div id="lista-veiculos" class="card">
                <h3>Ocorrências</h3>
                <div id="dados-excel">Aguardando base...</div>
            </div>
        </aside>

        <main class="content-area">
            <section id="mapa" class="aba-conteudo ativo">
                <div id="map"></div>
            </section>
            <section id="rotas" class="aba-conteudo">
                <h2>Análise de Trajeto</h2>
                <div class="card">Módulo em desenvolvimento.</div>
            </section>
            <section id="normas" class="aba-conteudo">
                <h2>Consultor de Normas</h2>
                <div class="card">Módulo em desenvolvimento.</div>
            </section>
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENTE RIG | Monitoramento Logístico</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>AGENTE RIG</h1>
            <p>Gestão Integrada de Transportes</p>
        </div>
        <div class="status">SISTEMA OPERACIONAL • OP-RJ-404</div>
    </header>

    <nav class="abas">
        <button class="tab-btn ativo" onclick="mudarAba('monitoramento')">Monitoramento de Rotas</button>
        <button class="tab-btn" onclick="mudarAba('consultor')">Consultor de Normas</button>
    </nav>

    <main id="conteudo">
        <div id="painel-principal">
            <div class="card-kpi">
                <h3>IQT (Qualidade)</h3>
                <p id="val-iqt">94.5%</p>
            </div>
            <div class="card-kpi">
                <h3>TCO (Custo Total)</h3>
                <p id="val-tco">R$ 12.450</p>
            </div>
            <div class="card-acao">
                <h3>Centro de Comando</h3>
                <input type="text" id="origem" placeholder="Origem: Av. Brasil, 5000">
                <input type="text" id="destino" placeholder="Destino: Centro, Niterói">
                <button onclick="analisarRota()">Analisar Rota</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

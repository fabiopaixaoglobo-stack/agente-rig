<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENTE RIG | Operações Globo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>AGENTE RIG</h1>
            <p>Comando de Transportes • Rio de Janeiro</p>
        </div>
        <div class="header-actions">
            <input type="file" id="upload-mapa" accept=".xlsx, .xls, .csv" hidden>
            <button class="btn-primary" onclick="document.getElementById('upload-mapa').click()">📥 Importar Relatório Mapa</button>
        </div>
    </header>

    <nav class="abas-navegacao">
        <button class="tab-btn ativo" onclick="alternarAba('mapa')">📍 Monitoramento Real-Time</button>
        <button class="tab-btn" onclick="alternarAba('rotas')">🛣️ Planejador de Rotas</button>
        <button class="tab-btn" onclick="alternarAba('normas')">⚖️ Consultor de Normas</button>
    </nav>

    <main id="conteudo-principal">
        <div id="secao-mapa" class="aba-conteudo">
            <div class="layout-mapa">
                <aside class="sidebar">
                    <div class="status-box">
                        <div class="kpi">Atendimentos: <strong id="total-atendimentos">0</strong></div>
                        <div class="kpi">Alertas Críticos: <strong id="alertas-seguranca" style="color:#ff4444">0</strong></div>
                    </div>
                    <div id="lista-atendimentos" class="lista-scroll">
                        <p class="aviso">Aguardando dados do Excel...</p>
                    </div>
                </aside>
                <div id="map">
                    <div class="legenda-mapa">
                        <div><span class="dot azul"></span> Atendimento</div>
                        <div><span class="dot vermelho"></span> Alerta Segurança (COR/PM)</div>
                        <div><span class="dot amarelo"></span> Alerta Climático</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="secao-rotas" class="aba-conteudo" style="display:none;">
            <div class="container-central">
                <h2>Planejador de Trajeto</h2>
                <div class="form-grupo">
                    <input type="text" id="origem" placeholder="Origem">
                    <input type="text" id="destino" placeholder="Destino">
                    <button class="btn-comando" onclick="alert('Calculando melhor rota via Linha Amarela/Brasil...')">Traçar</button>
                </div>
            </div>
        </div>

        <div id="secao-normas" class="aba-conteudo" style="display:none;">
            <div class="container-central">
                <h2>Consultor de Normas Globo</h2>
                <div class="botoes-rapidos">
                    <button onclick="consultar('MOPP')">MOPP</button>
                    <button onclick="consultar('TNO')">TNO</button>
                    <button onclick="consultar('Jornada')">Jornada</button>
                </div>
                <div id="resposta-ia" class="box-resposta">Consulte acima.</div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>

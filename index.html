<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>AGENTE RIG | Rota Inteligente</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">
      <span class="shield">🛡️</span>
      <div>
        <h1>AGENTE RIG</h1>
        <p>Gestão Integrada de Transportes</p>
      </div>
    </div>

    <div class="status">
      <span class="dot"></span>
      SISTEMA OPERACIONAL • OP-RJ-404
    </div>
  </header>

  <main>
    <nav class="tabs">
      <button class="active">Monitoramento de Rotas</button>
      <button>Consultor de Normas</button>
    </nav>

    <section class="grid">
      <div class="card">
        <img src="assets/rig-bg.jpg" alt="Centro de Comando IA" />
        <h3>Centro de Comando</h3>

        <label>Origem</label>
        <input placeholder="Av. Brasil, 5000 - Rio de Janeiro" />

        <label>Destino</label>
        <input placeholder="Centro, Niterói - RJ" />

        <button class="primary">Analisar Rota</button>
      </div>

      <div class="card center">
        <h3>Aguardando parâmetros</h3>
        <p>Insira origem e destino para iniciar a análise.</p>
      </div>

      <div class="card center">
        <h3>Mapa da rota</h3>
        <p>Aguardando coordenadas da rota…</p>
      </div>
    </section>
  </main>
</body>
</html>

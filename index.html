<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AGENTE RIG | Operações</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>AGENTE RIG</h1>
            <p>Sincronismo de Segurança & Logística</p>
        </div>
        <input type="file" id="upload-mapa" accept=".xlsx, .csv" hidden>
        <button onclick="document.getElementById('upload-mapa').click()">📥 Sincronizar Excel</button>
    </header>

    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('mapa')">📍 Monitoramento</button>
        <button class="tab-btn" onclick="showTab('rotas')">🛣️ Planejador</button>
        <button class="tab-btn" onclick="showTab('normas')">💬 Consultor RIG</button>
    </nav>

    <main>
        <section id="mapa" class="tab-content">
            <div id="map"></div>
        </section>

        <section id="rotas" class="tab-content hidden">
            <div class="card">
                <h2>Planejador de Rota</h2>
                <input type="text" placeholder="Origem">
                <input type="text" placeholder="Destino">
                <button onclick="alert('Analisando riscos...')">Analisar</button>
            </div>
        </section>

        <section id="normas" class="tab-content hidden">
            <div class="chat-wrapper">
                <div id="chat-msgs"></div>
                <div class="chat-input">
                    <input type="text" id="msg-input" placeholder="Consultar manual...">
                    <button onclick="sendMessage()">Enviar</button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>

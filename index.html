<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENTE RIG | Operações Logísticas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-logo">
            <h1>AGENTE RIG</h1>
            <p>Sincronismo de Segurança & Transportes</p>
        </div>
        <div class="header-actions">
            <input type="file" id="upload-mapa" accept=".xlsx, .xls, .csv" hidden>
            <button class="btn-sync" onclick="document.getElementById('upload-mapa').click()">📥 Sincronizar Base Excel</button>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <div id="chat-container">
                <div id="chat-messages">
                    <div class="message bot-msg">Sistema Agente RIG Online. Pronto para análise de dados.</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="chat-box" placeholder="Consultar sistema...">
                    <button onclick="enviarMensagem()">></button>
                </div>
            </div>
        </aside>

        <main class="map-area">
            <div id="map"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

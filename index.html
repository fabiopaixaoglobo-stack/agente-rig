<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>AGENTE RIG — Rota Inteligente Globo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <h1>AGENTE RIG — ROTA INTELIGENTE GLOBO</h1>
    <span>Gestão Integrada de Transportes</span>
  </div>

  <div class="status">
    <span class="dot"></span>
    SISTEMA OPERACIONAL | OP-RJ-404
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="monitoramento">MONITORAMENTO</button>
  <button class="tab-btn" data-tab="planejador">PLANEJADOR</button>
  <button class="tab-btn" data-tab="normas">NORMAS</button>
</nav>

<section class="hero">
  <img src="assets/agente-rig-hero.png" alt="AGENTE RIG">
</section>

<main>

<!-- MONITORAMENTO -->
<section id="monitoramento" class="tab-section active">
  <aside class="sidebar">
    <button id="btn-upload">Importar Base (XLSX)</button>
    <input type="file" id="upload-mapa" hidden>

    <h3>Filtro por Programa</h3>
    <select id="filtroPrograma"></select>

    <h3>Camadas</h3>
    <label><input type="checkbox" id="chk-seguranca" checked> Segurança</label><br>
    <label><input type="checkbox" id="chk-transito" checked> Trânsito</label><br>
    <label><input type="checkbox" id="chk-clima" checked> Clima</label>
  </aside>

  <section class="map-area">
    <div class="map-header">
      <h2>Monitoramento de Rotas</h2>
      <button id="btn-centralizar">Centralizar</button>
    </div>
    <div id="map"></div>
  </section>
</section>

<!-- PLANEJADOR -->
<section id="planejador" class="tab-section">
  <h2>Planejador de Rotas</h2>

  <div class="planejador-form">
    <input id="origem" placeholder="Endereço de origem">
    <input id="destino" placeholder="Endereço de destino">
    <button id="btn-tracar">Traçar Rota</button>
  </div>

  <div id="map-planejador"></div>
</section>

<!-- NORMAS -->
<section id="normas" class="tab-section">
  <h2>Consultor de Normas RIG</h2>

  <div class="chat" id="chatNormas">
    <div class="msg bot">Sistema operacional. Pergunte sobre TNO, Cargas 2026 ou Checklist.</div>
  </div>

  <div class="chat-input">
    <input id="perguntaNorma" placeholder="Digite sua dúvida sobre normas...">
    <button id="btnPerguntarNorma">Enviar</button>
  </div>
</section>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AGENTE RIG | Operações</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AGENTE RIG</h1>
        <button class="btn-import" onclick="document.getElementById('upload-mapa').click()">📥 Sincronizar Base</button>
        <input type="file" id="upload-mapa" accept=".xlsx, .csv" hidden>
    </header>

    <div class="layout-grid">
        <aside class="sidebar" id="painel-dados">
            <h3>Veículos & Ocorrências</h3>
            <div id="lista-veiculos">Carregue a base para visualizar...</div>
        </aside>
        <main id="map"></main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>

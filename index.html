<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENTE RIG | Comando Logístico</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>AGENTE RIG</h1>
            <p>Gestão Integrada de Transportes • Globo</p>
        </div>
        <div class="header-info">
            <span class="status-tag">SISTEMA OPERACIONAL • OP-RJ-404</span>
            <input type="file" id="upload-mapa" accept=".csv" hidden>
            <button class="btn-upload" onclick="document.getElementById('upload-mapa').click()">Atualizar Mapa (CSV)</button>
        </div>
    </header>

    <main class="dashboard">
        <aside class="sidebar">
            <div class="kpi-card">
                <h3>Atendimentos Agora</h3>
                <p id="contagem-agora">0</p>
            </div>
            <div class="kpi-card">
                <h3>Próxima Hora</h3>
                <p id="contagem-proxima">0</p>
            </div>
            <div id="lista-atendimentos" class="lista-scroll">
                </div>
        </aside>

        <section id="mapa-container">
            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

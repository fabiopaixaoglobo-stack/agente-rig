<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente RIG - Gestão de Transportes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Agente RIG - Monitoramento Integrado</h1>
        <p>Gestão de Operações e Segurança Logística</p>
    </header>

    <main>
        <section id="kpi-panel">
            <div class="card"><h3>IQT</h3><p id="iqt-val">--%</p></div>
            <div class="card"><h3>TCO</h3><p id="tco-val">R$ --</p></div>
            <div class="card"><h3>Status Frota</h3><p id="frota-val">Operacional</p></div>
        </section>

        <section id="consultor">
            <h2>Consultor de Normas</h2>
            <input type="text" id="pergunta" placeholder="Ex: Regras para transporte de carga perigosa...">
            <button onclick="consultarNorma()">Consultar</button>
            <div id="resposta-consultor">Aguardando consulta...</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENTE RIG | Centro de Comando</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>AGENTE RIG</h1>
            <p>Gestão Integrada de Transportes • Globo</p>
        </div>
        <div class="header-actions">
            <span class="status-tag">OPERACIONAL • RJ</span>
            <input type="file" id="upload-mapa" accept=".csv" hidden>
            <button class="btn-primary" onclick="document.getElementById('upload-mapa').click()">📲 Carregar Planilha</button>
        </div>
    </header>

    <nav class="abas-navegacao">
        <button class="tab-btn ativo" onclick="alternarAba('mapa')">📍 Mapa de Atendimentos</button>
        <button class="tab-btn" onclick="alternarAba('rotas')">🛣️ Planejador de Rotas</button>
        <button class="tab-btn" onclick="alternarAba('normas')">⚖️ Consultor de Normas</button>
    </nav>

    <main id="conteudo-principal">
        <div id="secao-mapa" class="aba-conteudo">
            <div class="layout-mapa">
                <aside class="sidebar">
                    <div class="kpi-mini">
                        <span>Atendimentos:</span>
                        <strong id="total-atendimentos">0</strong>
                    </div>
                    <div id="lista-atendimentos" class="lista-scroll">
                        <p class="aviso">Aguardando planilha...</p>
                    </div>
                </aside>
                <div id="map"></div>
            </div>
        </div>

        <div id="secao-rotas" class="aba-conteudo" style="display:none;">
            <div class="container-central">
                <h2>Análise de Rota e Risco</h2>
                <div class="form-grupo">
                    <input type="text" id="origem" placeholder="Ponto de Saída (Ex: Projac)">
                    <input type="text" id="destino" placeholder="Ponto de Chegada (Ex: Aeroporto GIG)">
                    <button class="btn-comando" onclick="calcularRotaManual()">Traçar Percurso</button>
                </div>
                <div id="painel-instrucoes"></div>
            </div>
        </div>

        <div id="secao-normas" class="aba-conteudo" style="display:none;">
            <div class="container-central">
                <h2>Consultor de Normas Inteligente</h2>
                <p>Consulte legislações (MOPP, Jornada, Velocidade).</p>
                <div class="form-grupo">
                    <input type="text" id="pergunta" placeholder="O que deseja consultar?">
                    <button class="btn-comando" onclick="consultarIA()">Consultar RIG</button>
                </div>
                <div id="resposta-ia" class="box-resposta"></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

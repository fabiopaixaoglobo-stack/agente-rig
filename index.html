<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENTE RIG | Centro de Comando</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>AGENTE RIG</h1>
            <p>Gestão Integrada de Transportes • Globo</p>
        </div>
        <div class="header-actions">
            <input type="file" id="upload-mapa" accept=".csv, .xlsx, .xls" hidden>
            <button class="btn-primary" onclick="document.getElementById('upload-mapa').click()">📲 Carregar Planilha (Excel/CSV)</button>
        </div>
    </header>

    <nav class="abas-navegacao">
        <button class="tab-btn ativo" onclick="alternarAba('mapa')">📍 Mapa de Atendimentos</button>
        <button class="tab-btn" onclick="alternarAba('rotas')">🛣️ Planejador de Rotas</button>
        <button class="tab-btn" onclick="alternarAba('normas')">⚖️ Consultor de Normas</button>
    </nav>

    <main id="conteudo-principal">
        <div id="secao-mapa" class="aba-conteudo">
            <div class="layout-mapa">
                <aside class="sidebar">
                    <div class="kpi-mini">Atendimentos: <strong id="total-atendimentos">0</strong></div>
                    <div id="lista-atendimentos" class="lista-scroll"><p class="aviso">Aguardando dados...</p></div>
                </aside>
                <div id="map"></div>
            </div>
        </div>

        <div id="secao-rotas" class="aba-conteudo" style="display:none;">
            <div class="container-central">
                <h2>Análise de Rota e Risco</h2>
                <div class="form-grupo">
                    <input type="text" id="origem" placeholder="Endereço de Saída">
                    <input type="text" id="destino" placeholder="Endereço de Chegada">
                    <button class="btn-comando" onclick="calcularRotaManual()">Analisar Trajeto</button>
                </div>
                <div id="painel-instrucoes" class="box-resposta"></div>
            </div>
        </div>

        <div id="secao-normas" class="aba-conteudo" style="display:none;">
            <div class="container-central">
                <h2>Consultor de Normas Inteligente</h2>
                <div class="botoes-rapidos">
                    <button onclick="perguntaRapida('MOPP')">Certificação MOPP</button>
                    <button onclick="perguntaRapida('TNO')">Regras TNO</button>
                    <button onclick="perguntaRapida('Jornada')">Controle de Jornada</button>
                    <button onclick="perguntaRapida('Monitoramento')">Monitoramento RIG</button>
                </div>
                <div class="form-grupo">
                    <input type="text" id="pergunta" placeholder="Digite sua dúvida operacional...">
                    <button class="btn-comando" onclick="consultarIA()">Consultar</button>
                </div>
                <div id="resposta-ia" class="box-resposta">Aguardando consulta...</div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
